<!DOCTYPE html>
<html lang="ar" >

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Skins - ZXKO Marketplace</title>

    <!-- Google Fonts -->

            <a href="home.html" class="icon" title="Home" data-tr-title="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>

            <!-- Versions Icon -->
            <a href="Versions.html" class="icon" title="Versions" data-tr-title="versions">

            <a href="worlds.html" class="icon" title="Worlds" data-tr-title="worlds">

                    <circle cx="12" cy="12" r="10"></circle>

            </a>

            <!-- Skins Icon -->
            <a href="Skins.html" class="icon active" title="Skins" data-tr-title="skins">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>

            <!-- Search Icon -->
            <a href="Search.html" class="icon" title="Search" data-tr-title="search">

                    <circle cx="11" cy="11" r="7"/>

        <div class="nav-actions">
            <div class="lang-switcher" onclick="toggleLanguage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>

            </div>
            <a href="admin.html" class="signin" data-tr="signin">Sign In</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="skins-search-container">
            <input type="text" id="skinSearch" class="skins-search-input" placeholder="Search by skin name or ID..." data-tr-placeholder="skins_placeholder">
        </div>

        <div id="skinGrid" class="skins-grid fade show">
            <!-- Dynamic skins will be loaded here from script.js -->
        </div>
    </div>

    <!-- External Script -->
    <script src="supabase-client.js"></script>
    <script src="script.js"></script>

    <!-- Ads Script (Pop-under) -->
