<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Versions - ZXKO Marketplace</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">ZX</div>
        <div class="sidebar-icons">
            <!-- Home Icon -->
            <a href="index.html" class="icon" title="Home" data-tr-title="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>

            <!-- Versions Icon -->
            <a href="Versions.html" class="icon active" title="Versions" data-tr-title="versions">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
            </a>

            <!-- Worlds Icon -->
            <a href="worlds.html" class="icon" title="Worlds" data-tr-title="worlds">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
            </a>

            <!-- Skins Icon -->
            <a href="Skins.html" class="icon" title="Skins" data-tr-title="skins">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>

            <!-- Search Icon -->
            <a href="Search.html" class="icon" title="Search" data-tr-title="search">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"/>
                    <line x1="16.5" y1="16.5" x2="21" y2="21"/>
                </svg>
            </a>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-actions">
            <div class="lang-switcher" onclick="toggleLanguage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <span id="lang-text" data-tr="lang_name">English</span>
            </div>
            <a href="admin.html" class="signin" data-tr="signin">Sign In</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="versions-container fade show" style="max-width: 800px;">
            <div class="versions-header">
                <h1 data-tr="versions_title">Minecraft Versions</h1>
                <svg class="header-icon" viewBox="0 0 24 24">
                    <path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.44c-.16.09-.34.14-.5.14s-.34-.05-.5-.14l-7.97-4.44c-.31-.17-.53-.51-.53-.88V7.5c0-.38.21-.71.53-.88l7.97-4.44c.16-.09.34-.14.5-.14s.34.05.5.14l7.97 4.44c.31.17.53.51.53.88v9z"/>
                </svg>
            </div>

            <div class="versions-tabs">
                <div class="tab-btn active" onclick="switchTab(event, 'official')">
                    <span data-tr="official_versions">Official Versions</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                </div>
                <div class="tab-btn" onclick="switchTab(event, 'patch')">
                    <span data-tr="patch_versions">Patch Versions</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                </div>
            </div>

            <!-- Official Versions List -->
            <div class="versions-list active" id="official-list">
                <!-- Loaded dynamically from script.js -->
            </div>

            <!-- Patch Versions List -->
            <div class="versions-list" id="patch-list">
                <!-- Loaded dynamically from script.js -->
            </div>
        </div>
    </div>

    <!-- Script for Tabs -->
    <script>
        function switchTab(event, tabId) {
            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // Remove active class from all lists
            document.querySelectorAll('.versions-list').forEach(list => list.classList.remove('active'));

            // Add active class to clicked button
            const clickedBtn = event.currentTarget;
            clickedBtn.classList.add('active');

            // Show target list
            document.getElementById(tabId + '-list').classList.add('active');
        }
    </script>
    <!-- External Script -->
    <script src="supabase-client.js"></script>
    <script src="script.js"></script>
</body>
</html>
