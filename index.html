<!DOCTYPE html>
<html lang="ar" >
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ZXKO Marketplace</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">ZX</div>
        <div class="sidebar-icons">
            <!-- Home Icon -->
            <a href="index.html" class="icon active" title="Home" data-tr-title="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>

            <!-- Versions Icon -->
            <a href="Versions.html" class="icon" title="Versions" data-tr-title="versions">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
            </a>

            <!-- Worlds Icon -->
            <a href="worlds.html" class="icon" title="Worlds" data-tr-title="worlds">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
            </a>

            <!-- Skins Icon -->
            <a href="Skins.html" class="icon" title="Skins" data-tr-title="skins">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>

            <!-- Search Icon -->
            <a href="Search.html" class="icon" title="Search" data-tr-title="search">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"/>
                    <line x1="16.5" y1="16.5" x2="21" y2="21"/>
                </svg>
            </a>
        </div>
    </div>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="nav-actions">
            <div class="lang-switcher" onclick="toggleLanguage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <span id="lang-text" data-tr="lang_name">English</span>
            </div>
            <a href="admin.html" class="signin" data-tr="signin">Sign In</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- HERO SECTION -->
        <div class="hero fade show">
            <!-- Featured Item (Large) -->
            <div class="hero-left-column">
                <div class="hero-left-wrapper">
                    <a href="item-details.html?name=Dark%20Fantasy%20Visuals&img=images/dark_fantasy.jpeg" class="hero-left" id="hero-link">
                        <img id="hero-img" src="images/dark_fantasy.jpeg" alt="Dark Fantasy Visuals">
                        <video id="hero-video" muted playsinline style="display: none;"></video>
                        <iframe id="hero-youtube" style="display: none;" allow="autoplay; mute; encrypted-media"></iframe>
                        <div class="hero-overlay"></div>
                        <div class="hero-bottom" id="hero-info">
                            <div class="hero-text">
                                <div class="hero-name-row">
                                    <div id="hero-name" class="hero-name">Dark Fantasy Visuals</div>
                                    <div id="hero-meta-info" class="hero-meta-info">1.21.1 • 32.1 MB</div>
                                </div>
                                <div id="hero-tag" class="tag tag-textures">TEXTURES</div>
                            </div>
                            <div class="hero-dl">
                                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="hero-dots" id="hero-dots">
                    <div class="dot active" onclick="setHero(0)"></div>
                    <div class="dot" onclick="setHero(1)"></div>
                    <div class="dot" onclick="setHero(2)"></div>
                </div>
            </div>

            <!-- Side Items (Small Cards) -->
            <div class="hero-right">
                <a href="item-details.html?name=Essentials&img=images/essentials_card.png" class="small-card">
                    <img src="images/essentials_card.png" alt="Essentials">
                    <div class="small-card-content">
                        <div class="small-card-info">
                            <h3>Essentials</h3>
                            <div class="tag tag-addon">ADD-ONS</div>
                        </div>
                        <div class="card-dl">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </div>
                    </div>
                </a>
                <a href="item-details.html?name=Prizma%20Visuals%202.1&img=https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=600" class="small-card">
                    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=600&auto=format&fit=crop" alt="Prizma Visuals 2.1">
                    <div class="small-card-content">
                        <div class="small-card-info">
                            <h3>Prizma Visuals 2.1</h3>
                            <div class="tag tag-textures">TEXTURES</div>
                        </div>
                        <div class="card-dl">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </div>
                    </div>
                </a>
                <a href="item-details.html?name=Dynamic%20Light&img=https://images.unsplash.com/photo-1519669417670-68775a50919c?q=80&w=600" class="small-card">
                    <img src="https://images.unsplash.com/photo-1519669417670-68775a50919c?q=80&w=600&auto=format&fit=crop" alt="Dynamic Light">
                    <div class="small-card-content">
                        <div class="small-card-info">
                            <h3>Dynamic Light</h3>
                            <div class="tag tag-addon">ADD-ONS</div>
                        </div>
                        <div class="card-dl">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </div>
                    </div>
                </a>
                <a href="item-details.html?name=Easy%20Redstone%201.1&img=https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=600" class="small-card">
                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=600&auto=format&fit=crop" alt="Easy Redstone 1.1">
                    <div class="small-card-content">
                        <div class="small-card-info">
                            <h3>Easy Redstone 1.1</h3>
                            <div class="tag tag-addon">ADD-ONS</div>
                        </div>
                        <div class="card-dl">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- DYNAMIC SECTIONS CONTAINER -->
        <div id="dynamic-sections-container"></div>

        <!-- ALL MODS GRID -->
        <div class="all-mods-section" style="margin-top: 60px;">
            <div class="section-title">
                <div class="title-left">
                    <div class="title-accent"></div>
                    <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <h2 data-tr="all_mods">All Mods</h2>
                </div>
            </div>
            
            <!-- Filters & Search -->
            <div class="all-mods-controls" style="display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: space-between; align-items: center;">
                <div class="filter-tabs" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="filter-btn active" data-filter="all" style="background: var(--accent-color); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s;">All</button>
                    <button class="filter-btn" data-filter="addons" style="background: #111; color: #aaa; border: 1px solid #222; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s;">Add-ons</button>
                    <button class="filter-btn" data-filter="maps" style="background: #111; color: #aaa; border: 1px solid #222; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s;">Maps</button>
                    <button class="filter-btn" data-filter="textures" style="background: #111; color: #aaa; border: 1px solid #222; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s;">Textures</button>
                    <button class="filter-btn" data-filter="skins" style="background: #111; color: #aaa; border: 1px solid #222; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s;">Skins</button>
                </div>
                <div class="search-box" style="position: relative;">
                    <input type="text" id="allModsSearch" placeholder="Search mods..." style="background: #111; border: 1px solid #222; color: #fff; padding: 8px 15px; border-radius: 6px; font-family: inherit; width: 250px; outline: none; transition: border 0.2s;">
                </div>
            </div>

            <div class="worlds-grid" id="all-mods-grid">
                <!-- Will be loaded dynamically -->
            </div>
        </div>

    </div>

    <!-- External Script -->
    <script src="supabase-client.js"></script>
    <script src="script.js"></script>
</body>
</html>
